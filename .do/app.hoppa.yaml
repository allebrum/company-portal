# Hoppa — multi-tenant SaaS test app. SEPARATE from the prod allebrum-portal
# app: own DO app, own managed clusters (hoppa-db / hoppa-redis), deploys from
# the `hoppa` branch. Never merge `hoppa` to `main` — the prod app watches main.
#
# One-time cluster setup (run as the DO operator):
#   doctl databases create hoppa-db    --engine pg     --region nyc1 --size db-s-1vcpu-1gb  --num-nodes 1 --version 16 --wait
#   doctl databases create hoppa-redis --engine valkey --region nyc1 --size db-amd-1vcpu-1gb --num-nodes 1               --wait
#
# Secrets (SESSION_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD) are NOT in this file —
# they're injected from an out-of-repo spec at `doctl apps create` time.
# Marketing/Stripe envs (MARKETING_API_URL / MARKETING_API_KEY /
# PROVISIONING_SECRET) are intentionally unset for the test: subscription
# gating no-ops to "allow" and the provisioning webhook is disabled, so Hoppa
# runs as a single self-hosted workspace until the marketing site exists.
name: hoppa-portal
region: nyc

services:
  - name: api
    source_dir: /
    github:
      branch: hoppa
      deploy_on_push: true
      repo: allebrum/company-portal
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @allebrum/shared build
      pnpm --filter @allebrum/api build
    run_command: pnpm --filter @allebrum/api db:migrate && pnpm --filter @allebrum/api db:init && pnpm --filter @allebrum/api start
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
    envs:
      - { key: NODE_ENV, value: production }
      - { key: API_PORT, value: "8080" }
      - { key: DATABASE_URL, scope: RUN_TIME, value: ${db.DATABASE_URL} }
      - { key: REDIS_URL, scope: RUN_TIME, value: ${redis.DATABASE_URL} }
      - { key: SESSION_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: WEB_ORIGIN, value: ${APP_URL} }
      - { key: ADMIN_EMAIL, scope: RUN_TIME, type: SECRET }
      - { key: ADMIN_PASSWORD, scope: RUN_TIME, type: SECRET }
      - { key: ALLOWED_EMAIL_DOMAINS, value: allebrum.com }

static_sites:
  - name: web
    source_dir: /
    github:
      branch: hoppa
      deploy_on_push: true
      repo: allebrum/company-portal
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @allebrum/shared build
      NEXT_PUBLIC_API_URL=${APP_URL} pnpm --filter @allebrum/web build
    output_dir: apps/web/out
    envs:
      - { key: NEXT_PUBLIC_API_URL, value: ${APP_URL} }

databases:
  - name: db
    cluster_name: hoppa-db
    db_name: defaultdb
    db_user: doadmin
    engine: PG
    version: "16"
    production: true
  - name: redis
    cluster_name: hoppa-redis
    engine: REDIS
    version: "7"
    production: true

ingress:
  rules:
    - match: { path: { prefix: /api } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: /socket.io } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: / } }
      component: { name: web }
