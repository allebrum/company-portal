name: allebrum-portal
region: nyc

services:
  - name: api
    source_dir: /
    github:
      branch: main
      deploy_on_push: true
      repo: allebrum/company-portal
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @allebrum/shared build
      pnpm --filter @allebrum/api build
    # Migrations + idempotent production bootstrap run inline at api start.
    # Both steps are safe to re-run (drizzle-kit tracks applied migrations
    # in __drizzle_migrations; init.ts upserts the permission catalog and
    # only creates the admin if absent). This replaces a previous PRE_DEPLOY
    # job, which DO monitoring kept flagging as "0/1 instances running"
    # after it completed — a cosmetic but persistent degradation warning.
    run_command: pnpm --filter @allebrum/api db:migrate && pnpm --filter @allebrum/api db:init && pnpm --filter @allebrum/api start
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
      # Higher delay: api startup now includes migrate + init (~10-15s cold)
      initial_delay_seconds: 30
    envs:
      - { key: NODE_ENV, value: production }
      - { key: API_PORT, value: "8080" }
      - { key: DATABASE_URL, scope: RUN_TIME, value: ${db.DATABASE_URL} }
      - { key: REDIS_URL, scope: RUN_TIME, value: ${redis.DATABASE_URL} }
      - { key: SESSION_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: WEB_ORIGIN, value: ${APP_URL} }
      # Google OAuth (set these to enable "Continue with Google")
      - { key: GOOGLE_OAUTH_CLIENT_ID, scope: RUN_TIME, type: SECRET }
      - { key: GOOGLE_OAUTH_CLIENT_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: OAUTH_REDIRECT_URL, value: ${APP_URL}/api/auth/google/callback }
      - { key: DRIVE_OAUTH_REDIRECT_URL, value: ${APP_URL}/api/integrations/drive/callback }
      # Consumed by db:init only (chained ahead of `start` in run_command).
      # init.ts validates these and exits with a clear error if missing.
      - { key: ADMIN_EMAIL, scope: RUN_TIME, type: SECRET }
      - { key: ADMIN_PASSWORD, scope: RUN_TIME, type: SECRET }
      - { key: ALLOWED_EMAIL_DOMAINS, value: allebrum.com }
      # Gmail send uses the same Google OAuth app as login + Drive; the
      # callback URL is derived in env.ts (no extra env needed). Each
      # teammate connects their own Gmail under Settings → Integrations,
      # and an admin designates a "system sender" for password-reset mail.

static_sites:
  - name: web
    source_dir: /
    github:
      branch: main
      deploy_on_push: true
      repo: allebrum/company-portal
    build_command: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm --filter @allebrum/shared build
      NEXT_PUBLIC_API_URL=${APP_URL} \
        NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY} \
        NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST} \
        pnpm --filter @allebrum/web build
    output_dir: apps/web/out
    envs:
      - { key: NEXT_PUBLIC_API_URL, value: ${APP_URL} }
      # PostHog public project key. Set in the DigitalOcean dashboard
      # (App Platform → Settings → Components → web → Environment
      # Variables). When unset, the SDK init is a no-op so the app keeps
      # working — analytics just doesn't fire.
      - { key: NEXT_PUBLIC_POSTHOG_KEY, value: '', scope: BUILD_TIME }
      # Optional host override (default https://us.i.posthog.com). Set
      # to https://eu.i.posthog.com if the project is in the EU region,
      # or to a self-hosted PostHog URL.
      - { key: NEXT_PUBLIC_POSTHOG_HOST, value: '', scope: BUILD_TIME }

databases:
  # Both databases are production-tier managed clusters pre-created once
  # with doctl, then referenced here by cluster_name. App Platform's "dev"
  # databases work for Postgres in services but were flaky for migration
  # jobs in our case (permission denied on the auto-bound URL), so we
  # standardised on managed clusters for predictable defaults.
  #
  # One-time setup (run as the DO operator on a fresh team):
  #   doctl databases create allebrum-portal-db    --engine pg     --region nyc1 --size db-s-1vcpu-1gb  --num-nodes 1 --version 16 --wait
  #   doctl databases create allebrum-portal-redis --engine valkey --region nyc1 --size db-amd-1vcpu-1gb --num-nodes 1               --wait
  - name: db
    cluster_name: allebrum-portal-db
    db_name: defaultdb
    db_user: doadmin
    engine: PG
    version: "16"
    production: true
  - name: redis
    cluster_name: allebrum-portal-redis
    engine: REDIS
    version: "7"
    production: true

ingress:
  rules:
    # preserve_path_prefix is required because Express mounts routes at /api
    # (and Socket.IO at /socket.io). Without it, DO strips the matched
    # prefix and forwards a path Express doesn't have a handler for.
    - match: { path: { prefix: /api } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: /socket.io } }
      component: { name: api, preserve_path_prefix: true }
    - match: { path: { prefix: / } }
      component: { name: web }
