services:
  postgres:
    image: postgres:16-alpine
    container_name: allebrum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: allebrum
      POSTGRES_PASSWORD: allebrum
      POSTGRES_DB: allebrum
    ports:
      - "5433:5432"
    volumes:
      - allebrum-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allebrum -d allebrum"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: allebrum-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - allebrum-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  allebrum-pgdata:
  allebrum-redisdata:
